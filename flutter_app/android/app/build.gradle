plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'com.google.gms.google-services'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    // MainActivity 실제 패키지와 일치 (com.example.flutter_app). 불일치 시 ClassNotFoundException
    namespace "com.example.flutter_app"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.progstudio3820.canvascash"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 23
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'

    // 애드팝콘 SSP 미디에이션 (가이드: https://adpopcornssp.gitbook.io/ssp-sdk/android/android)
    // AdMob / GAM (네이티브 등 미디에이션용, v24.8.0 호환)
    implementation 'com.google.android.gms:play-services-ads:24.8.0'
    // AdFit
    implementation 'com.kakao.adfit:ads-base:3.21.10'

    // 추가 미디에이션 (네이티브 지원 4개: NAM, Vungle, Mintegral, Pangle)
    // 1) NAM (Naver Ad Manager) - BOM으로 버전 관리
    implementation platform('com.naver.gfpsdk:nam-bom:8.10.3')
    implementation 'com.naver.gfpsdk:nam-core'
    implementation 'com.naver.gfpsdk.mediation:nam-nda'

    // 2) Vungle(LiftOff)
    implementation 'com.vungle:vungle-ads:7.6.1'

    // 3) Mintegral
    implementation 'com.mbridge.msdk.oversea:mbridge_android_sdk:17.0.31'

    // 4) Pangle
    implementation 'com.pangle.global:pag-sdk:7.8.0.7'

    // 기타 미디에이션 SDK는 추후 필요 시 하나씩 주석 해제 후 빌드 검증 권장
    // implementation 'com.fyber:marketplace-sdk:8.4.1'
    // implementation 'io.github.mezzo-platform:mezzo-sdk:3.1.1'
    // implementation 'com.fsn.cauly:cauly-sdk:3.5.41'
    // implementation 'io.github.mobon:mobwithSDK:1.0.67'
    // implementation 'com.coupang:ads:1.3.0'

    // 애드팝콘 오퍼월 (캠페인 참여하기 리워드 정보 조회용, adpopcornreward 플러그인과 동일 버전)
    implementation 'com.igaworks.offerwall:AdPopcornOfferwall:9.2.1'
}

configurations.all {
    resolutionStrategy {
        force 'androidx.lifecycle:lifecycle-viewmodel-savedstate:2.6.2'
        force 'androidx.lifecycle:lifecycle-runtime:2.6.2'
        force 'androidx.lifecycle:lifecycle-common:2.6.2'
    }
}

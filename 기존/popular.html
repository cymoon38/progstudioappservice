<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인기작품 - 그림 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 인증 체크 제거: 로그인 여부와 관계없이 인기작품 조회 가능 -->
    <script>
        // 전역 플래그 초기화 (리다이렉트 체크용)
        window.isRedirecting = false;
        window.authChecked = true; // 항상 true로 설정 (인증 체크 불필요)
    </script>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="그림 커뮤니티" class="logo">
                </a>
                <a href="index.html" class="nav-feed">피드</a>
                <a href="popular.html" class="nav-feed active">인기작품</a>
                <a href="mission.html" class="nav-feed">미션</a>
                <a href="shop.html" class="nav-feed">상점</a>
            </div>
            <div class="nav-right">
                <div class="points-display" id="pointsDisplay" style="display: none;">
                    <div class="point-item coin-item-clickable" id="coinItem" style="cursor: pointer;">
                        <div class="point-icon point-icon-yellow">
                            <span>C</span>
                        </div>
                        <span class="point-value" id="coinsValue">0</span>
                    </div>
                </div>
                <div class="notification-icon-wrapper" id="notificationWrapper" style="display: none;">
                    <div class="notification-icon" id="notificationIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                    </div>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </div>
                <div class="profile-dropdown" id="profileDropdown" style="display: none;">
                    <div class="profile-icon" id="profileIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" id="profileLink">마이페이지</a>
                        <a href="#" id="logoutBtn">로그아웃</a>
                    </div>
                </div>
                <a href="login.html" id="loginLink" class="nav-login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="popular-header">
            <h1>인기작품</h1>
            <p class="popular-header-description">좋아요가 많은 작품들을 확인해보세요</p>
            <div class="popular-header-search-container" style="display: none;">
                <div class="search-container">
                    <input type="text" id="popularSearchInput" placeholder="작품 검색" class="search-input" autocomplete="off">
                    <button id="popularSearchBtn" class="search-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="feed-container" id="popularContainer">
            <!-- 인기작품들이 여기에 동적으로 로드됩니다 -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="storage.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // 리다이렉트 중이면 모든 초기화 스킵 (즉시 실행 함수로 감싸기)
        (function() {
            // 리다이렉트 중이면 모든 초기화 스킵
            if (window.isRedirecting) {
                console.log('리다이렉트 중이므로 모든 스크립트 실행을 중지합니다.');
                // 페이지 전체 숨기기
                if (document.body) {
                    document.body.style.display = 'none';
                }
                // 모든 스크립트 실행 중단
                return;
            }
        })();
        
        // 전역 함수로 등록 (라우터에서 호출 가능하도록)
        window.loadPopularPosts = async function() {
            return await loadPopularPage();
        };
        
        // 중복 로드 방지 플래그
        let isLoadingPopularPage = false;
        
        async function loadPopularPage() {
            // 이미 로딩 중이면 중복 호출 방지
            if (isLoadingPopularPage) {
                console.log('인기작품 로드가 이미 진행 중입니다. 중복 호출을 무시합니다.');
                return;
            }
            
            const popularContainer = document.getElementById('popularContainer');
            if (!popularContainer) {
                console.error('popularContainer를 찾을 수 없습니다.');
                return;
            }

            isLoadingPopularPage = true;
            
            // 로딩 메시지 표시
            popularContainer.innerHTML = '<div class="no-posts"><p>인기작품을 불러오는 중...</p></div>';

            try {
                // dataManager와 db 초기화 대기 (타임아웃 단축)
                let dataManagerReady = false;
                let attempts = 0;
                const maxAttempts = 50; // 5초 대기로 단축
                
                while (!dataManagerReady && attempts < maxAttempts) {
                    if (window.dataManager && 
                        typeof window.dataManager.getPopularPosts === 'function' && 
                        db) {
                        dataManagerReady = true;
                        break;
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }

                if (!dataManagerReady) {
                    console.error('dataManager 또는 db를 초기화할 수 없습니다.');
                    console.log('window.dataManager:', window.dataManager);
                    console.log('db:', db);
                    popularContainer.innerHTML = '<div class="no-posts"><p>데이터 관리자를 초기화할 수 없습니다. 페이지를 새로고침해주세요.</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">브라우저 개발자 도구 콘솔을 확인해주세요.</p></div>';
                    return;
                }

                // 로그인 여부와 관계없이 인기 작품 가져오기
                console.log('인기작품 로드 시작...');
                console.log('dataManager:', window.dataManager);
                console.log('getPopularPosts 함수:', window.dataManager.getPopularPosts);
                
                let popularPosts = [];
                try {
                    // 타임아웃 추가 (10초)
                    const loadPromise = window.dataManager.getPopularPosts(50);
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('인기작품 로드 시간 초과 (10초)')), 10000)
                    );
                    
                    popularPosts = await Promise.race([loadPromise, timeoutPromise]);
                    console.log('인기작품 로드 완료:', popularPosts ? popularPosts.length : 0, '개');
                } catch (getPostsError) {
                    console.error('인기작품 가져오기 오류:', getPostsError);
                    popularContainer.innerHTML = '<div class="no-posts"><p>인기작품을 불러오는 중 오류가 발생했습니다.</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">오류: ' + (getPostsError.message || '알 수 없는 오류') + '</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">페이지를 새로고침해주세요.</p></div>';
                    return;
                }

                if (!popularPosts || popularPosts.length === 0) {
                    popularContainer.innerHTML = '<div class="no-posts"><p>아직 인기작품이 없습니다. (좋아요 2개 이상인 작품이 표시됩니다)</p></div>';
                    return;
                }

                popularContainer.innerHTML = '';

                // 현재 사용자 정보 가져오기 (없어도 작동)
                let currentUser = null;
                try {
                    // authManager가 존재하고 안전하게 호출
                    if (typeof authManager !== 'undefined' && authManager && typeof authManager.isLoggedIn === 'function') {
                        if (authManager.isLoggedIn()) {
                            try {
                                currentUser = await authManager.getCurrentUserAsync();
                            } catch (error) {
                                console.warn('사용자 정보 가져오기 오류 (무시):', error);
                            }
                        }
                    }
                } catch (error) {
                    console.warn('인증 확인 오류 (무시):', error);
                }
                
                console.log('인기작품 개수:', popularPosts.length);

                // DOM 조작을 배치 처리하여 화면 멈춤 방지 (간단하고 안전한 방식)
                let processedCount = 0;
                const batchSize = 10;
                
                // 단순한 for 루프로 처리 (재귀 대신)
                for (let startIndex = 0; startIndex < popularPosts.length; startIndex += batchSize) {
                    const endIndex = Math.min(startIndex + batchSize, popularPosts.length);
                    const fragment = document.createDocumentFragment();
                    
                    for (let i = startIndex; i < endIndex; i++) {
                        const post = popularPosts[i];
                        try {
                            const postCard = document.createElement('div');
                            const postCardClass = 'post-card';
                            
                            // 본 게시물인지 확인
                            let isViewed = false;
                            try {
                                const viewedPosts = getViewedPosts();
                                isViewed = viewedPosts && viewedPosts.includes ? viewedPosts.includes(post.id) : false;
                            } catch (viewError) {
                                console.warn('본 게시물 확인 오류:', viewError);
                            }
                        
                            // 본 게시물이면 클래스 추가
                            postCard.className = isViewed ? `${postCardClass} viewed-post` : postCardClass;
                            
                            const isOwner = currentUser && post.author === currentUser.username;
                            const likesCount = post.likes ? post.likes.length : 0;
                            const commentsCount = post.comments ? post.comments.length : 0;
                            
                            // 날짜 파싱 (모바일 호환성 개선)
                            let postDate;
                            try {
                                if (post.date) {
                                    // Firestore Timestamp 객체인 경우
                                    if (post.date.toDate && typeof post.date.toDate === 'function') {
                                        postDate = post.date.toDate();
                                    }
                                    // seconds와 nanoseconds 속성이 있는 경우 (직렬화된 Timestamp)
                                    else if (post.date.seconds) {
                                        postDate = new Date(post.date.seconds * 1000 + (post.date.nanoseconds || 0) / 1000000);
                                    }
                                    // 일반 Date 객체나 문자열인 경우
                                    else if (post.date instanceof Date) {
                                        postDate = post.date;
                                    }
                                    // ISO 문자열인 경우
                                    else if (typeof post.date === 'string') {
                                        postDate = new Date(post.date);
                                    }
                                    // 숫자 타임스탬프인 경우
                                    else if (typeof post.date === 'number') {
                                        postDate = new Date(post.date);
                                    }
                                    else {
                                        postDate = new Date();
                                    }
                                } else {
                                    postDate = new Date();
                                }

                                // 유효한 날짜인지 확인
                                if (isNaN(postDate.getTime())) {
                                    console.warn('유효하지 않은 날짜:', post.date);
                                    postDate = new Date();
                                }
                            } catch (error) {
                                console.error('날짜 파싱 오류:', error, post.date);
                                postDate = new Date();
                            }
                            
                            // 날짜 포맷팅 함수 (모바일 호환성)
                            function formatDate(date) {
                                try {
                                    if (!date || !(date instanceof Date) || isNaN(date.getTime())) {
                                        console.warn('유효하지 않은 날짜 객체:', date);
                                        const now = new Date();
                                        const year = now.getFullYear();
                                        const month = (now.getMonth() + 1).toString().padStart(2, '0');
                                        const day = now.getDate().toString().padStart(2, '0');
                                        return `${year}.${month}.${day}`;
                                    }
                                    const year = date.getFullYear();
                                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                    const day = date.getDate().toString().padStart(2, '0');
                                    return `${year}.${month}.${day}`;
                                } catch (error) {
                                    console.error('날짜 포맷팅 오류:', error, date);
                                    // 폴백: 현재 날짜 사용
                                    const now = new Date();
                                    const year = now.getFullYear();
                                    const month = (now.getMonth() + 1).toString().padStart(2, '0');
                                    const day = now.getDate().toString().padStart(2, '0');
                                    return `${year}.${month}.${day}`;
                                }
                            }
                            
                            // 날짜 문자열 미리 생성 (템플릿 리터럴에서 안전하게 사용)
                            const formattedDate = formatDate(postDate);
                            
                            const isPopular = likesCount >= 2; // 추천수 2 이상이면 인기 작품
                            
                            postCard.innerHTML = `
                                <div class="post-header" style="padding: 0; border: none; margin-bottom: 0;">
                                    <div class="post-author" style="margin-bottom: 0.5rem;">
                                        <span class="author-avatar"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1.5rem; height: 1.5rem;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
                                        <span class="author-name">${post.author}</span>
                                        ${isPopular ? '<span style="margin-left: 0.5rem;"><img src="crown.png" alt="인기작품" style="width: 20px; height: 20px; vertical-align: middle;"></span>' : ''}
                                    </div>
                                    <div class="post-header-right" style="gap: 0.5rem;">
                                        <span class="post-date">${formattedDate}</span>
                                        ${isOwner ? `<button class="delete-btn" data-post-id="${post.id}" title="삭제"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1.2rem; height: 1.2rem; display: inline-block; vertical-align: middle;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : ''}
                                    </div>
                                </div>
                                <div class="post-title" style="font-size: 1.1rem; font-weight: 600; color: #333; margin: 0.5rem 0; padding: 0;">${post.title || '제목 없음'}</div>
                                <div class="post-actions" style="padding: 0; border: none; gap: 1rem; margin-top: 0.5rem;">
                                    <span class="like-count" style="font-size: 0.9rem; display: flex; align-items: center; gap: 0.25rem;"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#ff6b6b" style="width: 0.9rem; height: 0.9rem;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> ${likesCount}</span>
                                    <span class="comment-count" style="font-size: 0.9rem; display: flex; align-items: center; gap: 0.25rem;"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#667eea" style="width: 0.9rem; height: 0.9rem;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg> ${commentsCount}</span>
                                    ${post.recreations && post.recreations.length > 0 ? `<span class="recreation-count" style="font-size: 0.9rem;">🎨 ${post.recreations.length}</span>` : ''}
                                </div>
                            `;
                            
                            // 카드에 데이터 속성 추가 (이벤트 위임을 위해 필요)
                            postCard.setAttribute('data-post-id', post.id);
                            
                            fragment.appendChild(postCard);
                            processedCount++;
                        } catch (postError) {
                            console.error('게시물 카드 생성 오류:', postError, post);
                        }
                    }
                    
                    // 배치를 DOM에 추가
                    popularContainer.appendChild(fragment);
                    
                    // 메인 스레드를 블로킹하지 않도록 배치 간 약간의 지연
                    if (endIndex < popularPosts.length) {
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }
                
                console.log('인기작품 렌더링 완료:', processedCount, '개');
                
                // 게시물 로드 후 이벤트 위임 재확인 (로그인하지 않은 상태 보장)
                try {
                    setupEventDelegation();
                } catch (eventError) {
                    console.warn('이벤트 위임 재설정 오류 (무시):', eventError);
                }
            } catch (error) {
                console.error('인기작품 로드 오류:', error);
                console.error('오류 스택:', error.stack);
                if (popularContainer) {
                    popularContainer.innerHTML = '<div class="no-posts"><p>인기작품을 불러오는 중 오류가 발생했습니다.</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">오류: ' + (error.message || '알 수 없는 오류') + '</p></div>';
                }
                
                // 오류 발생 시에도 이벤트 위임 설정 시도
                try {
                    setupEventDelegation();
                } catch (eventError) {
                    console.warn('오류 후 이벤트 위임 설정 오류 (무시):', eventError);
                }
            } finally {
                // 로딩 완료 후 플래그 해제
                isLoadingPopularPage = false;
            }
        }

        async function deletePost(postId) {
            if (confirm('정말 삭제하시겠습니까?')) {
                try {
                    await window.dataManager.deletePost(postId);
                    await loadPopularPage();
                    alert('게시물이 삭제되었습니다.');
                } catch (error) {
                    console.error('게시물 삭제 오류:', error);
                    alert('게시물 삭제 중 오류가 발생했습니다: ' + error.message);
                }
            }
        }
        
        // 전역 함수로 내보내기
        window.deletePost = deletePost;

        // 네비게이션 업데이트는 auth.js의 checkAuthState에서 처리됨
        // 이 함수는 제거 (중복 방지)

        // 프로필 드롭다운 설정
        function setupProfileDropdown() {
            try {
                // authManager 안전하게 확인
                if (typeof authManager === 'undefined' || !authManager) {
                    return; // 로그인하지 않은 상태이므로 드롭다운 설정 불필요
                }
                
                if (typeof authManager.onAuthStateChanged !== 'function') {
                    return;
                }
                
                authManager.onAuthStateChanged((user) => {
                    if (!user) return;
                
                const profileIcon = document.getElementById('profileIcon');
                const dropdownMenu = document.getElementById('dropdownMenu');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (profileIcon && dropdownMenu) {
                    profileIcon.onclick = function(e) {
                        e.stopPropagation();
                        const isVisible = dropdownMenu.style.display === 'block';
                        dropdownMenu.style.display = isVisible ? 'none' : 'block';
                    };
                    
                    // 드롭다운 외부 클릭 시 닫기 (하단바는 제외)
                    document.addEventListener('click', function(e) {
                        const profileDropdown = document.getElementById('profileDropdown');
                        // 하단바 클릭은 무시
                        if (e.target.closest('.bottom-nav')) {
                            return;
                        }
                        if (profileDropdown && !profileDropdown.contains(e.target)) {
                            dropdownMenu.style.display = 'none';
                        }
                    });
                }

                if (logoutBtn) {
                    logoutBtn.onclick = async function(e) {
                        e.preventDefault();
                        if (confirm('로그아웃하시겠습니까?')) {
                            try {
                                if (firebaseAuth) {

        // 본 게시물 목록 관리 함수 (전역)
        function getViewedPosts() {
            try {
                const viewed = localStorage.getItem('viewedPosts');
                return viewed ? JSON.parse(viewed) : [];
            } catch (error) {
                console.error('본 게시물 목록 가져오기 오류:', error);
                return [];
            }
        }

        function markAsViewed(postId) {
            try {
                const viewed = getViewedPosts();
                if (!viewed.includes(postId)) {
                    viewed.push(postId);
                    if (viewed.length > 1000) {
                        viewed.shift();
                    }
                    localStorage.setItem('viewedPosts', JSON.stringify(viewed));
                }
            } catch (error) {
                console.error('본 게시물 표시 오류:', error);
            }
        }

        // 이벤트 위임 설정 함수 (document 레벨에서 설정하여 안정성 보장)
        let eventDelegationSetup = false;
        
        function setupEventDelegation() {
            try {
                // 이미 설정되어 있으면 중복 방지
                if (eventDelegationSetup) {
                    return;
                }
                
                // document 레벨에서 이벤트 위임 설정 (내용이 변경되어도 유지됨)
                document.addEventListener('click', function(e) {
                    try {
                        // popularContainer 내부인지 확인
                        const popularContainer = document.getElementById('popularContainer');
                        if (!popularContainer || !popularContainer.contains(e.target)) {
                            return;
                        }
                        
                        // 하단바 클릭은 무시
                        if (e.target.closest('.bottom-nav')) {
                            return;
                        }
                        
                        // 링크나 버튼이 있는 경우 기본 동작 허용 (delete-btn 제외)
                        const link = e.target.closest('a');
                        const button = e.target.closest('button');
                        if ((link || button) && !e.target.closest('.delete-btn')) {
                            return;
                        }
                        
                        // post-card 내부가 아니면 무시
                        const postCard = e.target.closest('.post-card');
                        if (!postCard) return;
                        
                        const postId = postCard.getAttribute('data-post-id');
                        if (!postId) return;
                        
                        // 삭제 버튼 클릭 처리
                        if (e.target.classList.contains('delete-btn') || e.target.closest('.delete-btn')) {
                            e.stopPropagation();
                            e.preventDefault();
                            if (window.deletePost) {
                                window.deletePost(postId);
                            }
                            return;
                        }
                        
                        // 카드 클릭 처리 (링크나 버튼이 아닌 경우만)
                        markAsViewed(postId);
                        // 라우터를 사용하여 페이지 이동 (네비게이션 유지)
                        if (window.router && window.router.navigate) {
                            window.router.navigate('post-detail', { id: postId });
                        } else {
                            window.location.href = `post-detail.html?id=${postId}`;
                        }
                    } catch (error) {
                        console.error('이벤트 처리 오류:', error);
                    }
                }, true); // capture phase에서 처리하여 더 확실하게 작동
                
                eventDelegationSetup = true;
                console.log('이벤트 위임 설정 완료');
            } catch (error) {
                console.error('이벤트 위임 설정 오류:', error);
            }
        }

        // 페이지 로드 시 인기작품 로드
        let initPageRunning = false;
        let initPageCompleted = false;
        let isRedirecting = false; // 리다이렉트 중 플래그
        
        async function initPage() {
            // 라우터를 사용하는 경우 initPage는 실행하지 않음 (라우터가 처리)
            if (window.router && window.location.pathname !== '/popular.html' && !window.location.href.includes('popular.html')) {
                return;
            }
            
            // 리다이렉트 중이면 실행하지 않음
            if (window.isRedirecting) {
                console.log('리다이렉트 중이므로 페이지 초기화를 건너뜁니다.');
                return;
            }
            
            // 중복 실행 방지
            if (initPageRunning) {
                console.warn('initPage가 이미 실행 중입니다. 중복 호출을 무시합니다.');
                return;
            }
            
            if (initPageCompleted) {
                console.warn('initPage가 이미 완료되었습니다. 중복 호출을 무시합니다.');
                return;
            }
            
            initPageRunning = true;
            
            try {
                console.log('initPage 시작');
                
                // 이벤트 위임 설정 (나중에 실행해도 됨)
                try {
                    setupEventDelegation();
                } catch (eventError) {
                    console.warn('이벤트 위임 설정 오류 (무시):', eventError);
                }
                
                // 코인 모달 설정 (모바일에서 코인 클릭 기능 활성화)
                try {
                    if (typeof setupCoinModal === 'function') {
                        setupCoinModal();
                    } else {
                        // app.js가 아직 로드되지 않은 경우 재시도
                        setTimeout(() => {
                            if (typeof setupCoinModal === 'function') {
                                setupCoinModal();
                            }
                        }, 500);
                    }
                } catch (coinModalError) {
                    console.warn('코인 모달 설정 오류 (무시):', coinModalError);
                }
                
                // Firebase 초기화 대기 (더 긴 시간)
                console.log('Firebase 초기화 대기 중...');
                console.log('현재 상태 - dataManager:', typeof window.dataManager, 'db:', typeof db);
                
                await new Promise(resolve => {
                    let attempts = 0;
                    const checkInterval = setInterval(() => {
                        attempts++;
                        if (window.dataManager && typeof window.dataManager.getPopularPosts === 'function' && db) {
                            clearInterval(checkInterval);
                            console.log('Firebase 초기화 완료');
                            resolve();
                        } else if (attempts >= 50) { // 5초 대기로 단축
                            clearInterval(checkInterval);
                            console.warn('Firebase 초기화 대기 시간 초과 (계속 진행)');
                            console.log('최종 상태 - dataManager:', typeof window.dataManager, 'db:', typeof db);
                            resolve();
                        }
                    }, 100);
                });
                
                // 인기작품 로드
                console.log('loadPopularPage 호출...');
                await loadPopularPage();
                console.log('initPage 완료');
                
                initPageCompleted = true;
            } catch (error) {
                console.error('페이지 초기화 오류:', error);
                console.error('오류 스택:', error.stack);
                const container = document.getElementById('popularContainer');
                if (container) {
                    container.innerHTML = '<div class="no-posts"><p>페이지를 불러오는 중 오류가 발생했습니다.</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">오류: ' + (error.message || '알 수 없는 오류') + '</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">브라우저 콘솔을 확인해주세요.</p></div>';
                }
            } finally {
                initPageRunning = false;
            }
        }

        // 알림 설정 함수 (app.js의 함수 사용)
        function setupNotifications(userId) {
            const notificationIcon = document.getElementById('notificationIcon');
            const notificationBadge = document.getElementById('notificationBadge');
            const notificationModal = document.getElementById('notificationModal');
            const notificationClose = document.getElementById('notificationClose');
            const notificationList = document.getElementById('notificationList');
            const noNotifications = document.getElementById('noNotifications');
            const markAllReadBtn = document.getElementById('markAllReadBtn');
            
            if (!notificationIcon || !userId) return;
            
            // 알림 아이콘 클릭 시 모달 열기
            notificationIcon.onclick = function() {
                if (notificationModal) {
                    notificationModal.style.display = 'block';
                    loadNotifications(userId);
                }
            };
            
            // 모달 닫기
            if (notificationClose) {
                notificationClose.onclick = function() {
                    if (notificationModal) {
                        notificationModal.style.display = 'none';
                    }
                };
            }
            
            // 모달 외부 클릭 시 닫기
            if (notificationModal) {
                // 모달 외부 클릭 시 닫기 (하단바는 제외)
                window.addEventListener('click', function(e) {
                    if (e.target === notificationModal && !e.target.closest('.bottom-nav')) {
                        notificationModal.style.display = 'none';
                    }
                });
            }
            
            // 모두 읽음 처리
            if (markAllReadBtn) {
                markAllReadBtn.onclick = async function() {
                    try {
                        await window.dataManager.markAllNotificationsAsRead(userId);
                        await loadNotifications(userId);
                        await updateNotificationBadge(userId);
                    } catch (error) {
                        console.error('모두 읽음 처리 오류:', error);
                    }
                };
            }
            
            // 알림 로드 함수
            async function loadNotifications(uid) {
                try {
                    const notifications = await window.dataManager.getUserNotifications(uid);
                    
                    if (notifications.length === 0) {
                        if (notificationList) notificationList.innerHTML = '';
                        if (noNotifications) noNotifications.style.display = 'block';
                        if (markAllReadBtn) markAllReadBtn.style.display = 'none';
                        return;
                    }
                    
                    if (noNotifications) noNotifications.style.display = 'none';
                    
                    const unreadCount = notifications.filter(n => !n.read).length;
                    if (markAllReadBtn) {
                        markAllReadBtn.style.display = unreadCount > 0 ? 'inline-block' : 'none';
                    }
                    
                    if (notificationList) {
                        notificationList.innerHTML = '';
                        notifications.forEach(notification => {
                            const notificationItem = document.createElement('div');
                            notificationItem.className = `notification-item ${notification.read ? 'read' : 'unread'}`;
                            
                            const typeText = notification.type === 'like' ? '좋아요' : '댓글';
                            const typeIcon = notification.type === 'like' 
                                ? '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#ff6b6b" style="width: 1.5rem; height: 1.5rem; display: inline-block;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
                                : '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#667eea" style="width: 1.5rem; height: 1.5rem; display: inline-block;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
                            const isReply = notification.isReply === true;
                            const createdAt = notification.createdAt ? 
                                (notification.createdAt.toDate ? notification.createdAt.toDate() : new Date(notification.createdAt)) : 
                                new Date();
                            const timeAgo = getTimeAgo(createdAt);
                            
                            let notificationText = '';
                            if (isReply) {
                                notificationText = `<strong>${notification.author}</strong>님이 "${notification.postTitle}"에 답글을 달았습니다`;
                            } else {
                                notificationText = `<strong>${notification.author}</strong>님이 "${notification.postTitle}"에 ${typeText}${notification.type === 'comment' ? '을 달았습니다' : '를 눌렀습니다'}`;
                            }
                            
                            notificationItem.innerHTML = `
                                <div class="notification-content">
                                    <div class="notification-icon-badge">${typeIcon}</div>
                                    <div class="notification-text-wrapper">
                                        <div class="notification-text">
                                            ${notificationText}
                                            ${notification.type === 'comment' && notification.commentText ? `<br><span style="color: #666; font-size: 0.9rem;">"${notification.commentText.substring(0, 50)}${notification.commentText.length > 50 ? '...' : ''}"</span>` : ''}
                                        </div>
                                        <div class="notification-time">${timeAgo}</div>
                                    </div>
                                </div>
                            `;
                            
                            notificationItem.onclick = async function() {
                                // 알림 읽음 처리
                                if (!notification.read) {
                                    await window.dataManager.markNotificationAsRead(notification.id);
                                    notificationItem.classList.remove('unread');
                                    notificationItem.classList.add('read');
                                    await updateNotificationBadge(uid);
                                }
                                
                                // 게시물 상세 페이지로 이동
                                window.location.href = `post-detail.html?id=${notification.postId}`;
                            };
                            
                            notificationList.appendChild(notificationItem);
                        });
                    }
                } catch (error) {
                    console.error('알림 로드 오류:', error);
                }
            }
            
            // 시간 표시 함수
            function getTimeAgo(date) {
                const now = new Date();
                const diff = now - date;
                const seconds = Math.floor(diff / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);
                
                if (days > 0) return `${days}일 전`;
                if (hours > 0) return `${hours}시간 전`;
                if (minutes > 0) return `${minutes}분 전`;
                return '방금 전';
            }
            
            // 알림 배지 업데이트
            async function updateNotificationBadge(uid) {
                try {
                    const count = await window.dataManager.getUnreadNotificationCount(uid);
                    if (notificationBadge) {
                        if (count > 0) {
                            notificationBadge.textContent = count > 99 ? '99+' : count;

                            notificationBadge.style.display = 'none';
                        }
                    }

                    console.error('알림 배지 업데이트 오류:', error);
                }
            }
            
            // 실시간 알림 리스너
            if (db) {
                try {
                    const notificationsRef = db.collection('notifications')
                        .where('userId', '==', userId)
                        .where('read', '==', false)
                        .orderBy('createdAt', 'desc')
                        .limit(1);
                    
                    window.notificationUnsubscribe = notificationsRef.onSnapshot(async (snapshot) => {
                        await updateNotificationBadge(userId);

                            const fallbackRef = db.collection('notifications')
                                .where('userId', '==', userId)
                                .where('read', '==', false);
                            
                            window.notificationUnsubscribe = fallbackRef.onSnapshot(async () => {
                                await updateNotificationBadge(userId);
                            });
                        } catch (fallbackError) {
                            console.error('알림 리스너 fallback 오류:', fallbackError);
                        }
                    });
                } catch (error) {
                    console.error('알림 리스너 설정 오류:', error);
                }
            }
            
            // 초기 알림 배지 업데이트
            updateNotificationBadge(userId);
        }

                                            }
                                        }
                                    }, 300);
                                } else {
                                    // 로그인하지 않은 경우에도 네비게이션 업데이트 (로그인 버튼 표시)
                                    if (window.updateNavigation) {
                                        window.updateNavigation(null);
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn('인증 상태 확인 오류 (무시):', e);
                            // 오류 발생 시에도 계속 진행 (인기작품은 볼 수 있음)
                            if (window.updateNavigation) {
                                window.updateNavigation(null);
                            }
                        }
                    }
                    
                    console.log('페이지 초기화 계속 진행 (로그인 여부와 무관)');
                    
                    // 이벤트 위임 먼저 설정 (버튼이 작동하도록)
                    try {
                        setupEventDelegation();
                    } catch (eventError) {
                        console.warn('초기 이벤트 위임 설정 오류 (무시):', eventError);
                    }
                    
                    // 코인 모달 설정 (모바일에서 코인 클릭 기능 활성화)
                    try {
                        if (typeof setupCoinModal === 'function') {
                            setupCoinModal();
                        } else {
                            // app.js가 아직 로드되지 않은 경우 재시도
                            setTimeout(() => {
                                if (typeof setupCoinModal === 'function') {
                                    setupCoinModal();
                                }
                            }, 500);
                        }
                    } catch (coinModalError) {
                        console.warn('코인 모달 설정 오류 (무시):', coinModalError);
                    }
                    
                    // 약간의 지연을 두어 모든 스크립트가 로드되도록 함 (지연 시간 단축)
                    setTimeout(function() {
                        // 다시 한 번 리다이렉트 체크
                        if (window.isRedirecting) {
                            console.log('리다이렉트 확인. initPage 실행을 중단합니다.');
                            return;
                        }
                        
                        console.log('initPage 호출 시작');
                        initPage().catch(function(error) {
                            // 리다이렉트 오류는 무시
                            if (window.isRedirecting) {
                                return;
                            }
                            
                            console.error('페이지 초기화 오류:', error);
                            const container = document.getElementById('popularContainer');
                            if (container) {
                                container.innerHTML = '<div class="no-posts"><p>페이지를 불러오는 중 오류가 발생했습니다. 새로고침해주세요.</p><p style="font-size: 0.8rem; color: #999; margin-top: 0.5rem;">오류: ' + (error.message || '알 수 없는 오류') + '</p></div>';
                            }
                            
                            // 오류 발생 시에도 이벤트 위임 재설정 시도
                            try {
                                setupEventDelegation();
                            } catch (eventError) {
                                console.warn('오류 후 이벤트 위임 설정 오류 (무시):', eventError);
                            }
                        });
                    }, 100); // 인증 체크 완료 후 바로 실행
                } catch (error) {
                    // 리다이렉트 오류는 무시
                    if (window.isRedirecting) {
                        return;
                    }
                    
                    console.error('초기화 함수 실행 오류:', error);
                    const container = document.getElementById('popularContainer');
                    if (container) {
                        container.innerHTML = '<div class="no-posts"><p>페이지 초기화 중 오류가 발생했습니다. 새로고침해주세요.</p></div>';
                    }
                    
                    // 오류 발생 시에도 이벤트 위임 설정 시도
                    try {
                        setupEventDelegation();
                    } catch (eventError) {
                        console.warn('초기화 오류 후 이벤트 위임 설정 오류 (무시):', eventError);
                    }
                }
            }
            
            // 여러 이벤트에서 실행 시도 (안전장치)
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startInit);
            } else {
                // DOM이 이미 로드된 경우 약간의 지연 후 실행 (로그인 체크 시간 확보)
                setTimeout(startInit, 200);
            }
            
            // 추가 안전장치: window.onload 이벤트에서도 실행
            window.addEventListener('load', function() {
                // 라우터를 사용하는 경우 실행하지 않음
                if (window.router && window.location.pathname !== '/popular.html' && !window.location.href.includes('popular.html')) {
                    return;
                }
                
                if (window.isRedirecting) {
                    return;
                }
                
                if (!initStarted) {
                    console.log('window.onload에서 initPage 시작');
                    startInit();
                } else {
                    // 이미 시작되었어도 이벤트 위임은 재확인
                    try {
                        setupEventDelegation();
                    } catch (eventError) {
                        console.warn('window.onload 이벤트 위임 설정 오류 (무시):', eventError);
                    }
                }
            }, { once: true });
        })();
        
        // 인기작품 페이지 모바일 검색바 기능 설정
        const popularSearchInput = document.getElementById('popularSearchInput');
        const popularSearchBtn = document.getElementById('popularSearchBtn');
        
        if (popularSearchInput && popularSearchBtn) {
            popularSearchBtn.addEventListener('click', function() {
                const query = popularSearchInput.value.trim();
                if (query) {
                    window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                }
            });
            
            popularSearchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const query = popularSearchInput.value.trim();
                    if (query) {
                        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                    }
                }
            });
        }
    </script>

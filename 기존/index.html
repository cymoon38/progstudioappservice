<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그림 커뮤니티 - 메인 피드</title>
    <link rel="stylesheet" href="style.css">
    <!-- 상단바 즉시 업데이트를 위한 인라인 스크립트 -->
    <script>
        // 상단바를 즉시 업데이트하기 위한 최소한의 코드 (스크립트 로딩 전 실행)
        (function() {
            // localStorage에서 마지막 로그인 상태 확인 (초기 표시)
            try {
                const lastAuthState = localStorage.getItem('lastAuthState');
                if (lastAuthState === 'logged_in') {
                    // 로그인 상태로 추정되는 경우 상단바 즉시 업데이트 시도
                    const loginLink = document.getElementById('loginLink');
                    const profileDropdown = document.getElementById('profileDropdown');
                    const notificationWrapper = document.getElementById('notificationWrapper');
                    const pointsDisplay = document.getElementById('pointsDisplay');
                    
                    if (loginLink && profileDropdown && notificationWrapper) {
                        loginLink.style.display = 'none';
                        profileDropdown.style.display = 'block';
                        notificationWrapper.style.display = 'block';
                    }
                    
                    // 코인도 즉시 표시 (localStorage에서 값 가져오기)
                    if (pointsDisplay) {
                        pointsDisplay.style.display = 'flex';
                        pointsDisplay.style.visibility = 'visible';
                        pointsDisplay.style.opacity = '1';
                        pointsDisplay.style.transition = 'none';
                        pointsDisplay.classList.add('coins-visible');
                        pointsDisplay.classList.remove('coins-hidden');
                        
                        // localStorage에서 마지막 코인 잔액 가져와서 즉시 표시
                        try {
                            const lastCoinBalance = localStorage.getItem('lastCoinBalance');
                            if (lastCoinBalance) {
                                const coinsValue = pointsDisplay.querySelector('.point-value');
                                if (coinsValue) {
                                    coinsValue.textContent = lastCoinBalance;
                                }
                            }
                        } catch (e) {
                            // localStorage 접근 실패 시 무시
                        }
                    }
                }
            } catch (e) {
                // localStorage 접근 실패 시 무시
            }
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="그림 커뮤니티" class="logo">
                </a>
                <a href="index.html" class="nav-feed active">피드</a>
                <a href="popular.html" class="nav-feed">인기작품</a>
                <a href="mission.html" class="nav-feed">미션</a>
                <a href="shop.html" class="nav-feed">상점</a>
            </div>
            <div class="nav-right">
                <div class="points-display" id="pointsDisplay" style="display: none;">
                    <div class="point-item coin-item-clickable" id="coinItem" style="cursor: pointer;">
                        <div class="point-icon point-icon-yellow">
                            <span>C</span>
                        </div>
                        <span class="point-value" id="coinsValue">0</span>
                    </div>
                </div>
                <div class="notification-icon-wrapper" id="notificationWrapper" style="display: none;">
                    <div class="notification-icon" id="notificationIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                    </div>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-icon" id="profileIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" id="profileLink">마이페이지</a>
                        <a href="#" id="logoutBtn">로그아웃</a>
                    </div>
                </div>
                <a href="login.html" id="loginLink" class="nav-login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 프로모션 배너 섹션 -->
        <div class="promo-banner-section">
            <div class="promo-banner">
                <div class="promo-banner-content">
                    <h2 class="promo-title">그림 커뮤니티</h2>
                    <p class="promo-description">다양한 작품을 감상하고 나만의 작품을 공유해보세요</p>
                    <button class="promo-btn">시작하기</button>
                </div>
                <div class="promo-indicator">
                    <span>1</span>/<span>3</span>
                </div>
            </div>
        </div>

        <!-- 기능 아이콘 행 -->
        <div class="feature-icons-section">
            <div class="feature-icons-container">
                <div class="feature-icon-item">
                    <div class="feature-icon-circle">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
                        </svg>
                    </div>
                    <span class="feature-icon-label">출석체크</span>
                </div>
                <div class="feature-icon-item">
                    <div class="feature-icon-circle">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                        </svg>
                    </div>
                    <span class="feature-icon-label">미션</span>
                </div>
                <div class="feature-icon-item">
                    <div class="feature-icon-circle">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        </svg>
                    </div>
                    <span class="feature-icon-label">스토어</span>
                </div>
                <div class="feature-icon-item">
                    <div class="feature-icon-circle">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <span class="feature-icon-label">충전소</span>
                </div>
            </div>
        </div>

        <!-- 돈버는 미션 섹션 -->
        <div class="mission-preview-section">
            <div class="mission-preview-header">
                <div>
                    <h3 class="mission-preview-title">돈버는 미션 시작!</h3>
                    <p class="mission-preview-subtitle">지금 <span id="missionPointsPreview">0</span> 포인트 모으기</p>
                </div>
                <a href="mission.html" class="mission-more-btn">더보기 &gt;</a>
            </div>
            <div class="mission-preview-list" id="missionPreviewList">
                <!-- 미션 미리보기가 여기에 동적으로 로드됩니다 -->
            </div>
        </div>

        <div class="feed-header">
            <div class="feed-header-search-container">
                <div class="search-container">
                    <input type="text" id="feedSearchInput" placeholder="작품 검색" class="search-input" autocomplete="off">
                    <button id="feedSearchBtn" class="search-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="upload-btn" id="uploadBtn">
                <span class="upload-btn-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </span>
                <span>작품 업로드</span>
            </button>
        </div>

        <div class="feed-container" id="feedContainer">
            <!-- 그림 피드가 여기에 동적으로 로드됩니다 -->
        </div>
    </div>

    <!-- 업로드 모달 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>새 그림 업로드</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="type-selection">
                    <label class="type-label">작품 유형 <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="postType" value="original" required>
                            <span>창작</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="postType" value="recreation" required>
                            <span>모작</span>
                        </label>
                    </div>
                </div>
                
                <div class="upload-area">
                    <label class="upload-label-text">본인이 그린 그림 <span class="required">*</span></label>
                    <input type="file" id="imageInput" accept="image/*" required>
                    <label for="imageInput" class="upload-label">
                        <span class="upload-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                            </svg>
                        </span>
                        <span>이미지를 선택하세요</span>
                    </label>
                    <div id="imagePreview" class="image-preview"></div>
                </div>

                <div id="originalImageSection" class="upload-area" style="display: none;">
                    <label class="upload-label-text">원본 그림 <span class="required">*</span></label>
                    <input type="file" id="originalImageInput" accept="image/*">
                    <label for="originalImageInput" class="upload-label">
                        <span class="upload-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                            </svg>
                        </span>
                        <span>원본 그림을 선택하세요</span>
                    </label>
                    <div id="originalImagePreview" class="image-preview"></div>
                </div>

                <div class="form-group">
                    <label for="titleInput" class="upload-label-text">제목 <span class="required">*</span></label>
                    <input type="text" id="titleInput" placeholder="작품 제목을 입력하세요..." required>
                </div>
                <textarea id="captionInput" placeholder="그림 설명을 입력하세요..." rows="3"></textarea>
                
                <div class="form-group">
                    <label for="tagsInput" class="upload-label-text">태그 (최대 5개, 쉼표로 구분)</label>
                    <input type="text" id="tagsInput" placeholder="예: 그림, 디지털아트, 일러스트, 캐릭터, 판타지" maxlength="100" autocomplete="off">
                    <small class="form-hint">태그는 쉼표(,)로 구분하여 입력하세요. 최대 5개까지 입력 가능합니다.</small>
                </div>
                
                <button type="submit" class="btn-primary">업로드</button>
            </form>
        </div>
    </div>

    <!-- 알림 모달 -->
    <div id="notificationModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close" id="notificationClose">&times;</span>
            <h2>알림</h2>
            <div id="notificationList" class="notification-list">
                <!-- 알림 목록이 여기에 동적으로 로드됩니다 -->
            </div>
            <div id="noNotifications" class="no-notifications" style="display: none;">
                <p>알림이 없습니다.</p>
            </div>
            <div class="notification-actions" style="margin-top: 1rem; text-align: right;">
                <button id="markAllReadBtn" class="btn-secondary" style="display: none;">모두 읽음 처리</button>
            </div>
        </div>
    </div>

    <!-- 코인 모달 -->
    <div id="coinModal" class="modal">
        <div class="modal-content coin-modal-content">
            <span class="close" id="coinModalClose">&times;</span>
            <div class="coin-modal-header">
                <div class="coin-balance-display">
                    <div class="coin-icon-large">
                        <span>C</span>
                    </div>
                    <div class="coin-balance-info">
                        <h2>내 코인</h2>
                        <div class="coin-balance-amount">
                            <span id="coinModalBalance">0</span>
                            <span class="coin-unit">코인</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 코인 내역 -->
            <div class="coin-history-section">
                <div class="coin-history-list" id="coinHistoryList">
                    <div class="coin-history-empty">
                        <p>아직 코인 내역이 없습니다.</p>
                        <p class="coin-history-hint">미션을 완료하거나 출석체크를 하면 코인을 획득할 수 있습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="storage.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="router.js"></script>
    <script>
        // 라우터 초기화 (모든 스크립트 로드 후)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                if (window.router) {
                    window.router.init();
                }
            });
        } else {
            if (window.router) {
                window.router.init();
            }
        }
    </script>

    <!-- 모바일 하단 네비게이션 바 -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item active">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span>홈</span>
        </a>
        <a href="popular.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
            <span>인기작품</span>
        </a>
        <a href="mission.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <span>미션</span>
        </a>
        <a href="shop.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span>스토어</span>
        </a>
    </nav>
</body>
</html>

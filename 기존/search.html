<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 - 그림 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="그림 커뮤니티" class="logo">
                </a>
                <a href="index.html" class="nav-feed">피드</a>
                <a href="popular.html" class="nav-feed">인기작품</a>
                <a href="mission.html" class="nav-feed">미션</a>
                <a href="shop.html" class="nav-feed">상점</a>
            </div>
            <div class="nav-right">
                <div class="points-display" id="pointsDisplay" style="display: none;">
                    <div class="point-item coin-item-clickable" id="coinItem" style="cursor: pointer;">
                        <div class="point-icon point-icon-yellow">
                            <span>C</span>
                        </div>
                        <span class="point-value" id="coinsValue">0</span>
                    </div>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="작품 검색" class="search-input" value="" autocomplete="off">
                    <button id="searchBtn" class="search-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
                <div class="notification-icon-wrapper" id="notificationWrapper" style="display: none;">
                    <div class="notification-icon" id="notificationIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                    </div>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-icon" id="profileIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" id="profileLink">마이페이지</a>
                        <a href="#" id="logoutBtn">로그아웃</a>
                    </div>
                </div>
                <a href="login.html" id="loginLink" class="nav-login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="search-results-header">
            <h2 id="searchResultsTitle">검색 결과</h2>
            <p id="searchResultsCount" class="search-results-count"></p>
        </div>
        
        <div id="searchResultsContainer" class="feed-container">
            <p style="text-align: center; padding: 2rem;">검색 중...</p>
        </div>
    </div>

    <!-- 알림 모달 -->
    <div id="notificationModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close" id="notificationClose">&times;</span>
            <h2>알림</h2>
            <div id="notificationList" class="notification-list">
                <!-- 알림 목록이 여기에 동적으로 로드됩니다 -->
            </div>
            <div id="noNotifications" class="no-notifications" style="display: none;">
                <p>알림이 없습니다.</p>
            </div>
            <div class="notification-actions" style="margin-top: 1rem; text-align: right;">
                <button id="markAllReadBtn" class="btn-secondary" style="display: none;">모두 읽음 처리</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="storage.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="search.js"></script>

    <!-- 모바일 하단 네비게이션 바 -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span>홈</span>
        </a>
        <a href="popular.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
            <span>인기작품</span>
        </a>
        <a href="mission.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <span>미션</span>
        </a>
        <a href="shop.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span>스토어</span>
        </a>
    </nav>

    <!-- 코인 모달 -->
    <div id="coinModal" class="modal">
        <div class="modal-content coin-modal-content">
            <span class="close" id="coinModalClose">&times;</span>
            <div class="coin-modal-header">
                <div class="coin-balance-display">
                    <div class="coin-icon-large">
                        <span>C</span>
                    </div>
                    <div class="coin-balance-info">
                        <h2>내 코인</h2>
                        <div class="coin-balance-amount">
                            <span id="coinModalBalance">0</span>
                            <span class="coin-unit">코인</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 코인 내역 -->
            <div class="coin-history-section">
                <div class="coin-history-list" id="coinHistoryList">
                    <div class="coin-history-empty">
                        <p>아직 코인 내역이 없습니다.</p>
                        <p class="coin-history-hint">미션을 완료하거나 출석체크를 하면 코인을 획득할 수 있습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

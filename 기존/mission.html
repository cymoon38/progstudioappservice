<body>
    <!-- 인증 체크 제거: 로그인 여부와 관계없이 미션 조회 가능 -->
    <script>
        // 전역 플래그 초기화 (리다이렉트 체크용)
        window.isRedirecting = false;
        window.authChecked = true; // 항상 true로 설정 (인증 체크 불필요)
    </script>
    <nav class="navbar">
        <div class="nav-container">

                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="그림 커뮤니티" class="logo">

                <a href="popular.html" class="nav-feed">인기작품</a>
                <a href="mission.html" class="nav-feed active">미션</a>
                <a href="shop.html" class="nav-feed">상점</a>
            </div>
            <div class="nav-right">
                <div class="points-display" id="pointsDisplay" style="display: none;">
                    <div class="point-item coin-item-clickable" id="coinItem" style="cursor: pointer;">
                        <div class="point-icon point-icon-yellow">
                            <span>C</span>

                </div>
                <div class="notification-icon-wrapper" id="notificationWrapper" style="display: none;">
                    <div class="notification-icon" id="notificationIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                    </div>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-icon" id="profileIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" id="profileLink">마이페이지</a>
                        <a href="#" id="logoutBtn">로그아웃</a>

                </div>
                <a href="login.html" id="loginLink" class="nav-login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mission-header">
            <h1>돈버는 미션</h1>
            <p>다양한 미션을 완료하고 포인트를 받아보세요</p>
        </div>

        <div class="mission-stats-card">
            <div class="mission-stats-item">
                <div class="mission-stats-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="mission-stats-content">
                    <p class="mission-stats-label">완료한 미션</p>
                    <p class="mission-stats-value" id="completedMissions">0</p>
                </div>
            </div>
            <div class="mission-stats-item">
                <div class="mission-stats-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="mission-stats-content">
                    <p class="mission-stats-label">총 획득 포인트</p>
                    <p class="mission-stats-value" id="totalPoints">0P</p>
                </div>
            </div>
        </div>

        <div class="mission-list-section">
            <h2 class="mission-section-title">진행 가능한 미션</h2>
            <div class="mission-list" id="missionList">
                <!-- 미션 카드들이 여기에 동적으로 로드됩니다 -->
                <div class="mission-card">
                    <div class="mission-card-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <div class="mission-card-content">
                        <h3 class="mission-card-title">첫 작품 업로드하기</h3>
                        <p class="mission-card-description">작품을 업로드하면 포인트를 받을 수 있습니다</p>
                    </div>
                    <div class="mission-card-reward">
                        <span class="mission-reward-amount">100P</span>
                        <span class="mission-reward-type">즉시</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="storage.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // 프로필 드롭다운 설정 (app.js의 함수 사용)
        function setupProfileDropdown() {
            try {
                // authManager 안전하게 확인
                if (typeof authManager === 'undefined' || !authManager) {
                    return; // 로그인하지 않은 상태이므로 드롭다운 설정 불필요
                }
                
                if (typeof authManager.onAuthStateChanged !== 'function') {
                    return;
                }
                
                authManager.onAuthStateChanged((user) => {
                    if (!user) return;
                
                    const profileIcon = document.getElementById('profileIcon');
                    const dropdownMenu = document.getElementById('dropdownMenu');
                    const logoutBtn = document.getElementById('logoutBtn');
                    
                    if (profileIcon && dropdownMenu) {
                        profileIcon.onclick = function(e) {
                            e.stopPropagation();
                            const isVisible = dropdownMenu.style.display === 'block';
                            dropdownMenu.style.display = isVisible ? 'none' : 'block';
                        };
                        
                        document.onclick = function(e) {
                            const profileDropdown = document.getElementById('profileDropdown');
                            if (profileDropdown && !profileDropdown.contains(e.target)) {
                                dropdownMenu.style.display = 'none';
                            }
                        };
                    }

                    if (logoutBtn) {
                        logoutBtn.onclick = async function(e) {
                            e.preventDefault();
                            if (confirm('로그아웃하시겠습니까?')) {
                                try {
                                    if (firebaseAuth) {
                                        await firebaseAuth.signOut();
                                    }
                                    window.location.href = 'index.html';
                                } catch (error) {
                                    console.error('로그아웃 오류:', error);
                                }
                            }
                        };
                    }
                });
            } catch (error) {
                console.warn('프로필 드롭다운 설정 오류 (무시):', error);
            }
        }
        
        // 페이지 로드
        // app.js의 checkAuthState를 사용하여 인증 상태 확인 및 네비게이션 업데이트
        if (typeof checkAuthState === 'function') {
            checkAuthState();
        } else {
            // checkAuthState가 아직 로드되지 않은 경우 대기 후 재시도
            setTimeout(() => {
                if (typeof checkAuthState === 'function') {
                    checkAuthState();
                } else {
                    // 대안: authManager 사용
                    if (authManager) {
                        authManager.onAuthStateChanged((user) => {
                            if (window.updateNavigation) {
                                window.updateNavigation(user);
                            }
                            setupProfileDropdown();
                        });
                    }
                }
            }, 500);
        }
        
        // 초기 네비게이션 업데이트 (Firebase 로드 후 실행)
        setTimeout(() => {
            if (window.updateNavigation) {
                // 현재 사용자 확인 후 업데이트
                if (typeof firebaseAuth !== 'undefined' && firebaseAuth) {
                    // onAuthStateChanged로 최신 상태 확인
                    if (typeof firebaseAuth.onAuthStateChanged === 'function') {
                        firebaseAuth.onAuthStateChanged((user) => {
                            if (window.updateNavigation) {
                                window.updateNavigation(user);
                            }
                        });
                    } else {
                        // 대안: currentUser 사용
                        const currentUser = firebaseAuth.currentUser;
                        window.updateNavigation(currentUser || null);
                    }
                } else {
                    window.updateNavigation(null);
                }
            }
        }, 1000);
        setupProfileDropdown();
        
        // 코인 모달 설정 (모바일에서 코인 클릭 기능 활성화)
        try {
            if (typeof setupCoinModal === 'function') {
                setupCoinModal();
            } else {
                // app.js가 아직 로드되지 않은 경우 재시도
                setTimeout(() => {
                    if (typeof setupCoinModal === 'function') {
                        setupCoinModal();
                    }
                }, 500);
            }
        } catch (coinModalError) {
            console.warn('코인 모달 설정 오류 (무시):', coinModalError);
        }
    </script>

    <!-- 모바일 하단 네비게이션 바 -->

            </svg>
            <span>인기작품</span>
        </a>
        <a href="mission.html" class="bottom-nav-item active">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>

    <!-- 코인 모달 -->
    <div id="coinModal" class="modal">
        <div class="modal-content coin-modal-content">
            <span class="close" id="coinModalClose">&times;</span>
            <div class="coin-modal-header">
                <div class="coin-balance-display">
                    <div class="coin-icon-large">
                        <span>C</span>
                    </div>
                    <div class="coin-balance-info">
                        <h2>내 코인</h2>
                        <div class="coin-balance-amount">
                            <span id="coinModalBalance">0</span>
                            <span class="coin-unit">코인</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 코인 내역 -->
            <div class="coin-history-section">
                <div class="coin-history-list" id="coinHistoryList">
                    <div class="coin-history-empty">
                        <p>아직 코인 내역이 없습니다.</p>
                        <p class="coin-history-hint">미션을 완료하거나 출석체크를 하면 코인을 획득할 수 있습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

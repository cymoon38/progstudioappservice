<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그림 상세 - 그림 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <img src="logo.png" alt="그림 커뮤니티" class="logo">
                </a>
                <a href="index.html" class="nav-feed">피드</a>
                <a href="popular.html" class="nav-feed">인기작품</a>
                <a href="mission.html" class="nav-feed">미션</a>
                <a href="shop.html" class="nav-feed">상점</a>
            </div>
            <div class="nav-right">
                <div class="points-display" id="pointsDisplay" style="display: none;">
                    <div class="point-item coin-item-clickable" id="coinItem" style="cursor: pointer;">
                        <div class="point-icon point-icon-yellow">
                            <span>C</span>
                        </div>
                        <span class="point-value" id="coinsValue">0</span>
                    </div>
                </div>
                <div class="notification-icon-wrapper" id="notificationWrapper" style="display: none;">
                    <div class="notification-icon" id="notificationIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                    </div>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </div>
                <div class="profile-dropdown" id="profileDropdown" style="display: none;">
                    <div class="profile-icon" id="profileIcon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" id="profileLink">마이페이지</a>
                        <a href="#" id="logoutBtn">로그아웃</a>
                    </div>
                </div>
                <a href="login.html" id="loginLink" class="nav-login">로그인</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="post-detail-container">
            <div class="post-main">
                <div class="post-header">
                    <div class="post-author">
                        <span class="author-avatar">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </span>
                        <span class="author-name" id="authorName"></span>
                    </div>
                    <span class="post-date" id="postDate"></span>
                </div>
                
                <div class="post-title-section">
                    <h2 class="post-title-detail" id="postTitle"></h2>
                    <span class="post-views" id="postViews">조회수 0</span>
                </div>
                
                <div id="postTags" class="post-tags" style="margin-top: 1rem;">
                    <!-- 태그가 여기에 동적으로 표시됩니다 -->
                </div>
                
                <div class="post-image-container">
                    <img id="postImage" src="" alt="그림">
                    <button id="viewOriginalBtn" class="view-original-btn" style="display: none;">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1em; height: 1em;">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        원본 보기
                    </button>
                    <button id="viewCompressedBtn" class="view-compressed-btn" style="display: none;">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1em; height: 1em;">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        압축본 보기
                    </button>
                </div>
                
                <div class="post-caption" id="postCaption"></div>
                
                <div class="post-actions">
                    <button class="like-btn" id="likeBtn">
                        <span class="like-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#ff6b6b">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </span>
                        <span id="likeCount">0</span>
                    </button>
                    <button class="comment-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#667eea" style="width: 1em; height: 1em;">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                        </svg>
                        <span id="commentCount">0</span>
                    </button>
                </div>

                <div class="comments-section">
                    <h4>댓글</h4>
                    <div class="comment-form">
                        <textarea id="commentInput" placeholder="댓글을 입력하세요..." rows="2"></textarea>
                        <button class="btn-primary" id="submitComment">댓글 작성</button>
                    </div>
                    <div class="comments-list" id="commentsList"></div>
                </div>
            </div>

            <div class="recreation-sidebar">
                <button class="btn-secondary" id="uploadRecreationBtn" style="display: none;">따라그리기 업로드</button>
                <!-- 모작 작품의 원본 그림 표시 (모든 사용자가 볼 수 있음) -->
                <div id="originalImageDisplay" class="original-image-display" style="display: none;">
                    <h4>원본 그림</h4>
                    <img id="originalImage" src="" alt="원본 그림">
                </div>
                <!-- 따라그린 그림 섹션 (사용하지 않으므로 항상 숨김) -->
                <div class="recreations-grid" id="recreationsGrid" style="display: none;">
                    <!-- 따라그린 그림들이 여기에 표시됩니다 -->
                </div>
                <div id="noRecreations" class="no-recreations" style="display: none;">
                    <p>아직 따라그린 그림이 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 이미지 확대 모달 -->
    <div id="imageModal" class="image-modal">
        <span class="image-modal-close">&times;</span>
        <img id="modalImage" src="" alt="확대된 그림">
    </div>

    <!-- 따라그리기 업로드 모달 -->
    <div id="recreationModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>따라그린 그림 업로드</h2>
            <form id="recreationForm">
                <div class="upload-area">
                    <input type="file" id="recreationImageInput" accept="image/*" required>
                    <label for="recreationImageInput" class="upload-label">
                        <span class="upload-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                            </svg>
                        </span>
                        <span>이미지를 선택하세요</span>
                    </label>
                    <div id="recreationPreview" class="image-preview"></div>
                </div>
                <textarea id="recreationCaption" placeholder="따라그린 그림 설명..." rows="3"></textarea>
                <button type="submit" class="btn-primary">업로드</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="storage.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // URL에서 postId 가져오기 (라우터 사용 시에도 작동)
        function getPostIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        let postId = getPostIdFromURL();
        let currentPost = null;

        // 본 게시물로 표시 (app.js의 함수 사용 - 사용자별로 분리)
        function getCurrentUserId() {
            try {
                if (window.currentUser && window.currentUser.uid) {
                    return window.currentUser.uid;
                }
                if (typeof firebaseAuth !== 'undefined' && firebaseAuth && firebaseAuth.currentUser) {
                    return firebaseAuth.currentUser.uid;
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        function getViewedPosts() {
            try {
                // 현재 사용자 ID 가져오기
                const userId = getCurrentUserId();
                if (!userId) {
                    // 로그인하지 않은 사용자는 본 게시물 정보 없음
                    return [];
                }
                
                const key = `viewedPosts_${userId}`;
                const viewed = localStorage.getItem(key);
                return viewed ? JSON.parse(viewed) : [];
            } catch (error) {
                console.error('본 게시물 목록 가져오기 오류:', error);
                return [];
            }
        }

        function markAsViewed(postId) {
            try {
                // 현재 사용자 ID 가져오기
                const userId = getCurrentUserId();
                if (!userId) {
                    // 로그인하지 않은 사용자는 본 게시물 정보 저장 안 함
                    return;
                }
                
                const key = `viewedPosts_${userId}`;
                const viewed = getViewedPosts();
                if (!viewed.includes(postId)) {
                    viewed.push(postId);
                    // 최대 1000개까지만 저장 (메모리 절약)
                    if (viewed.length > 1000) {
                        viewed.shift();
                    }
                    localStorage.setItem(key, JSON.stringify(viewed));
                }
            } catch (error) {
                console.error('본 게시물 표시 오류:', error);
            }
        }

        // 인기작품 선정 체크 및 코인 지급 함수 (전역 함수로 등록)
        async function checkAndRewardPopularPost(postId, postData = null) {
            try {
                // 이미 처리 중이면 중복 실행 방지
                if (window.processingPopularPost && window.processingPopularPost[postId]) {
                    console.log('ℹ️ 이미 처리 중인 게시물:', postId);
                    return;
                }
                
                if (!window.processingPopularPost) {
                    window.processingPopularPost = {};
                }
                window.processingPopularPost[postId] = true;
                
                console.log('🔍 인기작품 선정 체크 시작 (전역 함수)...', {
                    postId: postId
                });
                
                // 1) 트랜잭션으로 "최초 1회만" 인기작품 선정 + 보상 플래그 세팅
                //    - 여러 클라이언트/탭에서 동시에 좋아요가 바뀌어도 중복 지급을 방지
                let updatedPost = null;
                let shouldReward = false;
                const postRef = db.collection('posts').doc(postId);

                const txResult = await db.runTransaction(async (tx) => {
                    const snap = await tx.get(postRef);
                    if (!snap.exists) return { ok: false, reason: 'no_post' };

                    const data = snap.data() || {};
                    updatedPost = { id: snap.id, ...data };

                    const likesArr = Array.isArray(data.likes) ? data.likes : [];
                    const currentLikes = likesArr.length;
                    const alreadyRewarded = data.popularRewarded === true;
                    const alreadyPopular = data.isPopular === true;

                    console.log('📊 게시물 상태 확인(트랜잭션):', {
                        currentLikes,
                        alreadyPopular,
                        alreadyRewarded,
                        postId
                    });

                    // 이미 인기작품이거나(또는) 보상 지급 완료면 더 이상 처리하지 않음
                    if (alreadyPopular || alreadyRewarded) {
                        return { ok: true, shouldReward: false };
                    }

                    // 좋아요 2개 이상이면 "인기작품 최초 선정" 처리
                    if (currentLikes >= 2) {
                        shouldReward = true;
                        tx.update(postRef, {
                            isPopular: true,
                            popularDate: firebase.firestore.FieldValue.serverTimestamp(),
                            popularRewarded: true,
                            popularRewardedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        return { ok: true, shouldReward: true };
                    }

                    return { ok: true, shouldReward: false };
                });

                if (!txResult || !txResult.ok || !shouldReward) {
                    console.log('ℹ️ 인기작품 보상 스킵:', { postId, txResult });
                    return;
                }

                // 트랜잭션에서 updatedPost가 채워지지 않았을 수 있으므로 보강
                if (!updatedPost) {
                    updatedPost = postData || await window.dataManager.getPost(postId);
                }

                console.log('🎉 인기작품 최초 선정! 코인 지급 시작...', {
                    postId,
                    author: updatedPost.author,
                    likers: updatedPost.likes
                });
                    
                    // 2) 좋아요를 누른 사람들에게 3코인씩 지급 (작성자 제외)
                    const likers = updatedPost.likes || [];
                    const authorName = updatedPost.author;
                    console.log('💰 좋아요 누른 사용자들에게 코인 지급 시작...', {
                        likers: likers,
                        author: authorName,
                        note: '글쓴이 본인은 제외됩니다'
                    });
                    
                    for (const likerUsername of likers) {
                        // 글쓴이 본인은 좋아요 보상에서 제외 (글쓴이는 10코인만 받음)
                        if (likerUsername === authorName) {
                            console.log(`ℹ️ 글쓴이 본인 (${likerUsername})은 좋아요 보상에서 제외됩니다. 글쓴이 보상(10코인)만 받습니다.`);
                            continue;
                        }
                        
                        try {
                            console.log(`🔍 사용자 UID 찾기: ${likerUsername}`);
                            const likerUid = await window.dataManager.getUserIdByUsername(likerUsername);
                            if (likerUid) {
                                console.log(`✅ UID 찾음: ${likerUid}, 코인 지급 시작...`);
                                await window.dataManager.addCoins(
                                    likerUid,
                                    3,
                                    '인기작품 선정 보상 (좋아요)',
                                    postId
                                );
                                console.log(`✅ 코인 지급 완료: ${likerUsername} (${likerUid})`);
                            } else {
                                console.warn(`⚠️ UID를 찾을 수 없음: ${likerUsername}`);
                            }
                        } catch (error) {
                            console.error(`❌ 좋아요 누른 사용자 코인 지급 오류 (${likerUsername}):`, error);
                        }
                    }
                    
                    // 3) 글쓴이에게 10코인 지급 (반드시 지급)
                    console.log('💰 글쓴이에게 코인 지급 시작...', {
                        author: updatedPost.author,
                        authorUid: updatedPost.authorUid,
                        postId: postId
                    });
                    
                    let authorUidForCoins = null;
                    
                    // 방법 1: 게시물에 authorUid가 저장되어 있으면 사용
                    if (updatedPost.authorUid) {
                        authorUidForCoins = updatedPost.authorUid;
                        console.log(`✅ authorUid 사용: ${authorUidForCoins}`);
                    } else {
                        // 방법 2: username으로 찾기
                        console.log(`⚠️ authorUid 없음, username으로 찾기: ${updatedPost.author}`);
                        try {
                            authorUidForCoins = await window.dataManager.getUserIdByUsername(updatedPost.author);
                            if (authorUidForCoins) {
                                console.log(`✅ UID 찾음: ${authorUidForCoins}`);
                            } else {
                                console.warn(`⚠️ username으로 UID를 찾을 수 없음: ${updatedPost.author}`);
                            }
                        } catch (error) {
                            console.error(`❌ getUserIdByUsername 오류:`, error);
                        }
                    }
                    
                    // 방법 3: 게시물 문서에서 직접 authorUid 가져오기 (최후의 수단)
                    if (!authorUidForCoins) {
                        try {
                            console.log(`⚠️ 다른 방법으로 UID 찾기 시도: 게시물 문서 직접 조회`);
                            const postDoc = await db.collection('posts').doc(postId).get();
                            if (postDoc.exists) {
                                const postData = postDoc.data();
                                if (postData.authorUid) {
                                    authorUidForCoins = postData.authorUid;
                                    console.log(`✅ 게시물 문서에서 authorUid 찾음: ${authorUidForCoins}`);
                                }
                            }
                        } catch (error) {
                            console.error(`❌ 게시물 문서 조회 오류:`, error);
                        }
                    }
                    
                    // 글쓴이에게 코인 지급 (UID를 찾았으면 반드시 지급)
                    if (authorUidForCoins) {
                        try {
                            console.log(`💰 글쓴이 코인 지급 시작: ${authorUidForCoins}, 10코인`);
                            const result = await window.dataManager.addCoins(
                                authorUidForCoins,
                                10,
                                '인기작품 선정 보상 (작성자)',
                                postId
                            );
                            console.log(`✅ 글쓴이 코인 지급 완료: ${authorUidForCoins} (${updatedPost.author})`, result);
                        } catch (error) {
                            console.error(`❌ 글쓴이 코인 지급 오류:`, error);
                            console.error('오류 상세:', {
                                authorUid: authorUidForCoins,
                                author: updatedPost.author,
                                postId: postId,
                                error: error.message,
                                code: error.code,
                                stack: error.stack
                            });
                        }
                    } else {
                        console.error(`❌ 글쓴이 UID를 찾을 수 없어 코인을 지급할 수 없음: ${updatedPost.author}`);
                        console.error('게시물 정보:', {
                            author: updatedPost.author,
                            authorUid: updatedPost.authorUid,
                            postId: postId,
                            updatedPostKeys: Object.keys(updatedPost)
                        });
                    }
                    
                    console.log('✅ 인기작품 코인 지급 완료');
                
                // 처리 완료 표시 제거 (5초 후)
                setTimeout(() => {
                    if (window.processingPopularPost) {
                        delete window.processingPopularPost[postId];
                    }
                }, 5000);
            } catch (error) {
                console.error('❌ 인기작품 코인 지급 오류 (전역 함수):', error);
                console.error('오류 상세:', {
                    message: error.message,
                    code: error.code,
                    stack: error.stack,
                    postId: postId
                });
                
                // 오류 발생 시에도 처리 완료 표시 제거
                if (window.processingPopularPost) {
                    delete window.processingPopularPost[postId];
                }
            }
        }
        
        // 전역 함수로 등록 (app.js에 이미 정의되어 있으면 덮어쓰지 않음)
        if (!window.checkAndRewardPopularPost) {
            window.checkAndRewardPopularPost = checkAndRewardPopularPost;
        }
        
        // 게시물 실시간 리스너 설정 (다른 사용자가 좋아요를 눌렀을 때 감지)
        let postListener = null;
        
        // 전역 함수로 등록 (라우터에서 호출 가능하도록)
        window.loadPostDetail = async function(postIdParam) {
            // 파라미터가 있으면 사용, 없으면 전역 postId 사용
            const targetPostId = postIdParam || postId || getPostIdFromURL();
            
            if (!targetPostId) {
                // postId가 없으면 라우터를 통해 index로 이동
                if (window.router && window.router.navigate) {
                    window.router.navigate('index');
                } else {
                    window.location.href = 'index.html';
                }
                return;
            }
            
            // 전역 postId 업데이트
            postId = targetPostId;
            
            currentPost = await dataManager.getPost(postId);
            
            if (!currentPost) {
                // 게시물이 없으면 라우터를 통해 index로 이동
                if (window.router && window.router.navigate) {
                    window.router.navigate('index');
                } else {
                    window.location.href = 'index.html';
                }
                return;
            }
            
            // 기존 리스너 제거
            if (postListener) {
                postListener();
                postListener = null;
            }
            
            // 게시물 실시간 리스너 설정
            postListener = db.collection('posts').doc(postId).onSnapshot(async (doc) => {
                if (doc.exists) {
                    const updatedPost = { id: doc.id, ...doc.data() };
                    const previousLikes = currentPost.likes ? currentPost.likes.length : 0;
                    const currentLikes = updatedPost.likes ? updatedPost.likes.length : 0;
                    
                    // 좋아요가 변경되었고, 2개 이상이며, 아직 인기작품이 아닌 경우
                    if (previousLikes !== currentLikes && currentLikes >= 2 && !updatedPost.isPopular) {
                        console.log('🔔 게시물 좋아요 변경 감지 (실시간 리스너):', {
                            postId: postId,
                            previousLikes: previousLikes,
                            currentLikes: currentLikes,
                            isPopular: updatedPost.isPopular
                        });
                        
                        // 인기작품 선정 체크 및 코인 지급
                        await checkAndRewardPopularPost(postId, updatedPost);
                    }
                    
                    // 현재 게시물 정보 업데이트
                    currentPost = updatedPost;
                    
                    // UI 업데이트
                    await updateLikeButton();
                }
            }, (error) => {
                console.error('❌ 게시물 리스너 오류:', error);
            });
            
            // 본 게시물로 표시
            markAsViewed(postId);
            
            // 게시물 작성자 정보 저장 (알림용)
            window.currentPostAuthor = currentPost.author;

            document.getElementById('authorName').textContent = currentPost.author;
            const postDate = currentPost.date ? (currentPost.date.toDate ? currentPost.date.toDate() : new Date(currentPost.date)) : new Date();
            document.getElementById('postDate').textContent = postDate.toLocaleDateString('ko-KR');
            document.getElementById('postTitle').textContent = currentPost.title || '제목 없음';
            const postImage = document.getElementById('postImage');
            
            // 이미지 URL 처리: 압축된 이미지를 기본으로 사용, 원본은 원본 보기 버튼에서 사용
            // 비용 절감을 위해 압축된 이미지 우선 사용
            const compressedImageUrl = currentPost.compressedImageUrl || currentPost.image; // 압축된 이미지 (기본 표시)
            const originalImageUrl = currentPost.originalImageUrl || null; // 원본 이미지 URL
            
            // 기본적으로 압축된 이미지 표시
            postImage.src = compressedImageUrl;
            
            // 원본 보기 버튼 표시/숨김 처리
            const viewOriginalBtn = document.getElementById('viewOriginalBtn');
            const viewCompressedBtn = document.getElementById('viewCompressedBtn');
            
            if (originalImageUrl) {
                // 원본 이미지가 있으면 원본 보기 버튼 표시
                viewOriginalBtn.style.display = 'block';
                viewCompressedBtn.style.display = 'none';
                
                // 원본 보기 버튼 클릭 이벤트
                viewOriginalBtn.onclick = function() {
                    postImage.src = originalImageUrl;
                    viewOriginalBtn.style.display = 'none';
                    viewCompressedBtn.style.display = 'block';
                };
                
                // 압축본 보기 버튼 클릭 이벤트
                viewCompressedBtn.onclick = function() {
                    postImage.src = compressedImageUrl;
                    viewCompressedBtn.style.display = 'none';
                    viewOriginalBtn.style.display = 'block';
                };
            } else {
                // 원본 이미지가 없으면 버튼 숨김
                viewOriginalBtn.style.display = 'none';
                viewCompressedBtn.style.display = 'none';
            }
            
            document.getElementById('postCaption').textContent = currentPost.caption || '';
            
            // 태그 표시
            const postTags = document.getElementById('postTags');
            if (postTags) {
                if (currentPost.tags && currentPost.tags.length > 0) {
                    postTags.innerHTML = currentPost.tags.map(tag => 
                        `<span class="tag-badge" style="background: #f0f2ff; color: #667eea; padding: 0.25rem 0.75rem; border-radius: 15px; font-size: 0.9rem; cursor: pointer;" onclick="window.location.href='search.html?q=${encodeURIComponent(tag)}'">#${tag}</span>`
                    ).join('');
                    postTags.style.display = 'flex';
                } else {
                    postTags.innerHTML = '';
                    postTags.style.display = 'none';
                }
            }
            
            // 이미지 클릭 시 확대 모달 열기
            postImage.onclick = function() {
                const imageModal = document.getElementById('imageModal');
                const modalImage = document.getElementById('modalImage');
                if (imageModal && modalImage) {
                    modalImage.src = this.src;
                    imageModal.style.display = 'flex';
                    document.body.style.overflow = 'hidden'; // 스크롤 방지
                }
            };
            
            // 조회수 표시 (로그인 여부와 관계없이 표시)
            if (!currentPost.views) currentPost.views = 0;
            document.getElementById('postViews').textContent = `조회수 ${currentPost.views}`;
            
            // 조회수 증가는 로그인한 사용자만 가능
            const isLoggedIn = authManager ? authManager.isLoggedIn() : false;
            if (isLoggedIn) {
                try {
                    currentPost.views++;
                    await window.dataManager.updatePost(currentPost);
                    document.getElementById('postViews').textContent = `조회수 ${currentPost.views}`;
                } catch (error) {
                    console.error('조회수 증가 오류:', error);
                    // 조회수 증가 실패해도 표시는 유지
                }
            }
            
            // 창작/모작에 따른 UI 처리
            const uploadRecreationBtn = document.getElementById('uploadRecreationBtn');
            const originalImageDisplay = document.getElementById('originalImageDisplay');
            const originalImage = document.getElementById('originalImage');
            
            // 따라그리기 업로드 버튼은 항상 숨김
            uploadRecreationBtn.style.display = 'none';
            
            // 모작인 경우: 모든 사용자가 원본 그림을 볼 수 있음
            if (currentPost.type === 'recreation' && currentPost.originalImage) {
                // 모작인 경우 원본 그림 표시 (작성자 여부와 관계없이)
                // 비용 절감을 위해 압축된 이미지 우선 사용 (하위 호환성 위해 원본도 지원)
                const originalImageUrl = currentPost.originalImageCompressed || currentPost.originalImage;
                originalImage.src = originalImageUrl;
                originalImageDisplay.style.display = 'block';
                
                // 모바일에서 원본 그림을 본인 그림 바로 아래로 이동
                if (window.innerWidth <= 768) {
                    const postImageContainer = document.querySelector('.post-image-container');
                    const postMain = document.querySelector('.post-main');
                    if (postImageContainer && postMain && originalImageDisplay) {
                        // 원본 그림을 본인 그림 바로 다음에 삽입
                        postImageContainer.insertAdjacentElement('afterend', originalImageDisplay);
                    }
                }
            } else {
                // 창작인 경우: 원본 그림 표시 안 함
                originalImageDisplay.style.display = 'none';
            }
            
            // 화면 크기 변경 시 원본 그림 위치 조정
            window.addEventListener('resize', () => {
                if (currentPost && currentPost.type === 'recreation' && currentPost.originalImage) {
                    const postImageContainer = document.querySelector('.post-image-container');
                    const postMain = document.querySelector('.post-main');
                    const recreationSidebar = document.querySelector('.recreation-sidebar');
                    
                    if (window.innerWidth <= 768) {
                        // 모바일: 원본 그림을 본인 그림 바로 아래로
                        if (postImageContainer && originalImageDisplay && originalImageDisplay.parentElement !== postMain) {
                            postImageContainer.insertAdjacentElement('afterend', originalImageDisplay);
                        }
                    } else {
                        // 데스크톱: 원본 그림을 사이드바로 복귀
                        if (recreationSidebar && originalImageDisplay && originalImageDisplay.parentElement !== recreationSidebar) {
                            recreationSidebar.insertBefore(originalImageDisplay, recreationSidebar.firstChild);
                        }
                    }
                }
            });
            
            // 로그인 상태 확인 및 UI 업데이트
            await updateLoginUI();
            
            await updateLikeButton();
            await loadComments();
            // 라우터로 DOM이 교체된 경우를 대비해 좋아요/댓글 리스너 재바인딩
            // 모바일에서도 안정적으로 작동하도록 약간의 지연 후 호출
            setTimeout(() => {
                if (typeof window.bindPostDetailInteractions === 'function') {
                    window.bindPostDetailInteractions();
                }
            }, 100);
            loadRecreations();
        }
        
        // 로그인 상태에 따른 UI 업데이트 (작성자 본인 포함 모든 로그인 사용자 활성화)
        async function updateLoginUI() {
            // authManager가 로드될 때까지 대기
            let isLoggedIn = false;
            
            // authManager 확인 (최대 3초 대기)
            for (let i = 0; i < 30; i++) {
                if (authManager && typeof authManager.isLoggedIn === 'function') {
                    isLoggedIn = authManager.isLoggedIn();
                    break;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            const likeBtn = document.getElementById('likeBtn');
            const commentInput = document.getElementById('commentInput');
            const submitComment = document.getElementById('submitComment');
            
            if (!isLoggedIn) {
                // 비로그인 사용자: 좋아요/댓글 버튼 비활성화
                if (likeBtn) {
                    likeBtn.disabled = true;
                    likeBtn.style.opacity = '0.5';
                    likeBtn.style.cursor = 'not-allowed';
                    likeBtn.title = '좋아요를 누르려면 로그인이 필요합니다.';
                }
                if (commentInput) {
                    commentInput.disabled = true;
                    commentInput.placeholder = '댓글을 작성하려면 로그인이 필요합니다.';
                }
                if (submitComment) {
                    submitComment.disabled = true;
                    submitComment.style.opacity = '0.5';
                    submitComment.style.cursor = 'not-allowed';
                }
            } else {
                // 로그인된 사용자(작성자 본인 포함): 좋아요/댓글 기능 활성화
                if (likeBtn) {
                    likeBtn.disabled = false;
                    likeBtn.style.opacity = '1';
                    likeBtn.style.cursor = 'pointer';
                    likeBtn.title = '좋아요';
                }
                if (commentInput) {
                    commentInput.disabled = false;
                    commentInput.placeholder = '댓글을 입력하세요...';
                }
                if (submitComment) {
                    submitComment.disabled = false;
                    submitComment.style.opacity = '1';
                    submitComment.style.cursor = 'pointer';
                }
            }
        }

        async function updateLikeButton() {
            const likeBtn = document.getElementById('likeBtn');
            const likeCount = document.getElementById('likeCount');
            
            if (!likeBtn || !likeCount || !currentPost) return;
            
            // 좋아요 수 표시 (로그인 여부와 관계없이)
            const likesCount = currentPost.likes && Array.isArray(currentPost.likes) ? currentPost.likes.length : 0;
            likeCount.textContent = likesCount;
            
            // 로그인 상태 확인
            const isLoggedIn = authManager ? authManager.isLoggedIn() : false;
            
            if (isLoggedIn) {
                try {
                    const currentUser = await authManager.getCurrentUserAsync();
                    if (currentUser && currentPost.likes && Array.isArray(currentPost.likes)) {
                        const isLiked = currentPost.likes.includes(currentUser.username);
                        likeBtn.classList.toggle('liked', isLiked);
                        
                        // 인기작품이고 좋아요를 눌렀다면 취소 불가능하도록 표시
                        if (isLiked && currentPost.isPopular) {
                            likeBtn.title = '인기작품에 선정된 작품은 좋아요를 취소할 수 없습니다.';
                            likeBtn.style.cursor = 'not-allowed';
                        } else {
                            likeBtn.title = '좋아요';
                            likeBtn.style.cursor = 'pointer';
                        }
                    } else {
                        likeBtn.classList.remove('liked');
                        likeBtn.title = '좋아요';
                        likeBtn.style.cursor = 'pointer';
                    }
                } catch (error) {
                    console.error('좋아요 버튼 업데이트 오류:', error);
                    likeBtn.classList.remove('liked');
                    likeBtn.title = '좋아요';
                    likeBtn.style.cursor = 'pointer';
                }
            } else {
                likeBtn.classList.remove('liked');
                likeBtn.title = '좋아요';
                likeBtn.style.cursor = 'pointer';
            }
        }

        async function loadComments() {
            const commentsList = document.getElementById('commentsList');
            const commentCount = document.getElementById('commentCount');
            
            if (!commentsList || !commentCount || !currentPost) return;
            
            commentsList.innerHTML = '';
            
            // 댓글 수 표시 (대댓글 포함, 로그인 여부와 관계없이)
            const comments = currentPost.comments && Array.isArray(currentPost.comments) ? currentPost.comments : [];
            
            // 대댓글 수를 재귀적으로 계산하는 함수
            function countReplies(replies) {
                if (!replies || !Array.isArray(replies)) return 0;
                let count = replies.length;
                replies.forEach(reply => {
                    if (reply.replies && Array.isArray(reply.replies)) {
                        count += countReplies(reply.replies);
                    }
                });
                return count;
            }
            
            // 댓글 수 + 모든 대댓글 수
            let totalCommentsCount = comments.length;
            comments.forEach(comment => {
                if (comment.replies && Array.isArray(comment.replies)) {
                    totalCommentsCount += countReplies(comment.replies);
                }
            });
            
            commentCount.textContent = totalCommentsCount;

            // 로그인 여부 확인 (로그인하지 않아도 댓글은 볼 수 있음)
            const isLoggedIn = authManager ? authManager.isLoggedIn() : false;
            let currentUser = null;
            
            if (isLoggedIn) {
                try {
                    currentUser = await authManager.getCurrentUserAsync();
                } catch (error) {
                    console.error('사용자 정보 가져오기 오류:', error);
                }
            }

            if (comments.length === 0) {
                commentsList.innerHTML = '<p style="text-align: center; padding: 1rem; color: #999;">아직 댓글이 없습니다.</p>';
                return;
            }

            // 대댓글 렌더링 함수 (재귀적)
            function renderReply(reply, commentIndex, replyPath) {
                const replyIsOwner = isLoggedIn && currentUser && reply.author === currentUser.username;
                const replyDate = reply.date ? (reply.date.toDate ? reply.date.toDate() : new Date(reply.date)) : new Date();
                const nestedReplies = reply.replies || [];
                
                // 경로를 JSON 문자열로 변환하여 전달
                const pathStr = JSON.stringify(replyPath);
                
                let nestedRepliesHtml = '';
                if (nestedReplies.length > 0) {
                    nestedRepliesHtml = '<div class="replies-container">';
                    nestedReplies.forEach((nestedReply, nestedIndex) => {
                        const nestedPath = [...replyPath, nestedIndex];
                        nestedRepliesHtml += renderReply(nestedReply, commentIndex, nestedPath);
                    });
                    nestedRepliesHtml += '</div>';
                }
                
                // 대댓글 입력 폼 (대댓글에도 답글 가능)
                const replyFormId = `replyForm_${commentIndex}_${replyPath.join('_')}`;
                const replyFormHtml = isLoggedIn ? `
                    <div class="reply-form" id="${replyFormId}" style="display: none;">
                        <textarea class="reply-input" id="replyInput_${commentIndex}_${replyPath.join('_')}" placeholder="댓글을 입력하세요..." rows="2"></textarea>
                        <div class="reply-form-actions">
                            <button class="reply-submit-btn" onclick="submitNestedReply(${commentIndex}, '${pathStr}')">작성</button>
                            <button class="reply-cancel-btn" onclick="cancelNestedReply(${commentIndex}, '${pathStr}')">취소</button>
                        </div>
                    </div>
                ` : '';
                
                return `
                    <div class="reply-item">
                        <div class="comment-content">
                            <div class="comment-main">
                                <div class="comment-header">
                                    <span class="comment-author">${reply.author}</span>
                                    <span class="comment-date">${replyDate.toLocaleDateString('ko-KR')}</span>
                                </div>
                                <div class="comment-text">${reply.text || ''}</div>
                            </div>
                            <div class="comment-actions">
                                ${isLoggedIn ? `<button class="reply-btn" onclick="toggleNestedReplyForm(${commentIndex}, '${pathStr}')">답글</button>` : ''}
                                ${replyIsOwner ? `<button class="delete-comment-btn" onclick="deleteNestedReply(${commentIndex}, '${pathStr}')" title="대댓글 삭제"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1em; height: 1em;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : ''}
                            </div>
                        </div>
                        ${nestedRepliesHtml}
                        ${replyFormHtml}
                    </div>
                `;
            }
            
            comments.forEach((comment, index) => {
                if (!comment || !comment.author) return; // 유효하지 않은 댓글 제외
                
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment-item';
                const isOwner = isLoggedIn && currentUser && comment.author === currentUser.username;
                const commentDate = comment.date ? (comment.date.toDate ? comment.date.toDate() : new Date(comment.date)) : new Date();
                
                // 대댓글 목록
                const replies = comment.replies || [];
                let repliesHtml = '';
                if (replies.length > 0) {
                    repliesHtml = '<div class="replies-container">';
                    replies.forEach((reply, replyIndex) => {
                        repliesHtml += renderReply(reply, index, [replyIndex]);
                    });
                    repliesHtml += '</div>';
                }
                
                // 대댓글 입력 폼 (댓글에 대한)
                const replyFormHtml = isLoggedIn ? `
                    <div class="reply-form" id="replyForm_${index}" style="display: none;">
                        <textarea class="reply-input" id="replyInput_${index}" placeholder="댓글을 입력하세요..." rows="2"></textarea>
                        <div class="reply-form-actions">
                            <button class="reply-submit-btn" onclick="submitReply(${index})">작성</button>
                            <button class="reply-cancel-btn" onclick="cancelReply(${index})">취소</button>
                        </div>
                    </div>
                ` : '';
                
                commentDiv.innerHTML = `
                    <div class="comment-content">
                        <div class="comment-main">
                            <div class="comment-header">
                                <span class="comment-author">${comment.author}</span>
                                <span class="comment-date">${commentDate.toLocaleDateString('ko-KR')}</span>
                            </div>
                            <div class="comment-text">${comment.text || ''}</div>
                        </div>
                        <div class="comment-actions">
                            ${isLoggedIn ? `<button class="reply-btn" onclick="toggleReplyForm(${index})">답글</button>` : ''}
                            ${isOwner ? `<button class="delete-comment-btn" onclick="deleteComment(${index})" title="댓글 삭제"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 1em; height: 1em;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : ''}
                        </div>
                    </div>
                    ${repliesHtml}
                    ${replyFormHtml}
                `;
                commentsList.appendChild(commentDiv);
            });
        }

        // 대댓글 폼 토글 (전역 함수로 등록)
        window.toggleReplyForm = function(commentIndex) {
            const replyForm = document.getElementById(`replyForm_${commentIndex}`);
            if (replyForm) {
                const isVisible = replyForm.style.display !== 'none';
                replyForm.style.display = isVisible ? 'none' : 'block';
                if (!isVisible) {
                    const replyInput = document.getElementById(`replyInput_${commentIndex}`);
                    if (replyInput) {
                        replyInput.focus();
                    }
                }
            }
        };

        // 대댓글 취소 (전역 함수로 등록)
        window.cancelReply = function(commentIndex) {
            const replyForm = document.getElementById(`replyForm_${commentIndex}`);
            const replyInput = document.getElementById(`replyInput_${commentIndex}`);
            if (replyForm) replyForm.style.display = 'none';
            if (replyInput) replyInput.value = '';
        };

        // 대댓글 작성 (전역 함수로 등록)
        window.submitReply = async function(commentIndex) {
            if (!authManager || !authManager.isLoggedIn()) {
                alert('로그인이 필요합니다.');
                return;

                }
            }
            
            // checkAuthState 호출 (비동기로 최신 상태 확인)
            if (typeof checkAuthState === 'function') {
                checkAuthState();
            } else {
                // checkAuthState가 아직 로드되지 않은 경우 대기 후 재시도
                setTimeout(() => {
                    if (typeof checkAuthState === 'function') {
                        checkAuthState();
                    } else if (authManager) {
                        // 대안: authManager 사용
                        authManager.onAuthStateChanged(async (user) => {
                            // 이미 올바른 상태인지 확인
                            const profileDropdown = document.getElementById('profileDropdown');
                            const notificationWrapper = document.getElementById('notificationWrapper');
                            const pointsDisplay = document.getElementById('pointsDisplay');
                            
                            const isAlreadyCorrect = user && profileDropdown && 
                                                    profileDropdown.style.display === 'block' &&
                                                    notificationWrapper &&
                                                    notificationWrapper.style.display === 'block' &&
                                                    pointsDisplay &&
                                                    pointsDisplay.style.display === 'flex';
                            
                            if (!isAlreadyCorrect && window.updateNavigation) {
                                window.updateNavigation(user);
                            }
                            setupProfileDropdown();
                            // 로그인 상태가 변경되면 UI 업데이트
                            if (currentPost) {
                                await updateLoginUI();
                                await updateLikeButton();
                                await loadComments();
                            }
                        });
                    }
                }, 100);
            }
        }
        
        // 프로필 드롭다운 설정만 수행 (네비게이션 업데이트는 제외)
        if (authManager) {
            authManager.onAuthStateChanged(async (user) => {
                // 라우터를 사용하는 경우 네비게이션 업데이트는 건너뛰기
                if (!isRouterNavigation && window.updateNavigation) {
                    // 이미 올바른 상태인지 확인
                    const profileDropdown = document.getElementById('profileDropdown');
                    const notificationWrapper = document.getElementById('notificationWrapper');
                    const pointsDisplay = document.getElementById('pointsDisplay');
                    
                    const isAlreadyCorrect = user && profileDropdown && 
                                            profileDropdown.style.display === 'block' &&
                                            notificationWrapper &&
                                            notificationWrapper.style.display === 'block' &&
                                            pointsDisplay &&
                                            pointsDisplay.style.display === 'flex';
                    
                    if (!isAlreadyCorrect) {
                        window.updateNavigation(user);
                    }
                }
                setupProfileDropdown();
                // 로그인 상태가 변경되면 UI 업데이트
                if (currentPost) {
                    await updateLoginUI();
                    await updateLikeButton();
                    await loadComments();
                }
            });
        }
        
        setupProfileDropdown();
        
        // 코인 모달 설정 (다른 페이지와 동일하게)
        if (typeof setupCoinModal === 'function') {
            setupCoinModal();
        }
        
        // 이미지 확대 모달 닫기
        const imageModal = document.getElementById('imageModal');
        const imageModalClose = document.querySelector('.image-modal-close');
        if (imageModalClose) {
            imageModalClose.onclick = function() {
                if (imageModal) {
                    imageModal.style.display = 'none';
                    document.body.style.overflow = 'auto'; // 스크롤 복원
                }
            };
        }
        if (imageModal) {
            imageModal.onclick = function(e) {
                if (e.target === imageModal) {
                    imageModal.style.display = 'none';
                    document.body.style.overflow = 'auto'; // 스크롤 복원
                }
            };
        }
        
        // 초기 로드 (postId가 있을 때만)
        if (postId) {
            loadPostDetail();
        }
    </script>
